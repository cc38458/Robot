<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RA605 末端控制器</title>
<style>
:root {
  --bg:    #0a0e17;
  --panel: #111827;
  --brd:   #1e293b;
  --acc:   #22d3ee;
  --acc2:  #a78bfa;
  --ok:    #10b981;
  --warn:  #f59e0b;
  --err:   #ef4444;
  --txt:   #e2e8f0;
  --dim:   #64748b;
  --mono:  'JetBrains Mono', 'Consolas', monospace;
  --btn-size: clamp(68px, 10vw, 90px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--mono);
  height: 100%;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

body {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── Header ── */
header {
  background: var(--panel);
  border-bottom: 1px solid var(--brd);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
header h1 { font-size: 13px; letter-spacing: 2px; color: var(--acc); }
#statusBadge {
  padding: 3px 10px; border-radius: 4px;
  font-size: 11px; font-weight: 700;
  background: #1e293b; color: var(--dim);
  transition: background .3s, color .3s;
}
#statusBadge.ready  { background: #064e3b; color: #34d399; }
#statusBadge.alarm  { background: #7f1d1d; color: #fca5a5; }
#statusBadge.warn   { background: #78350f; color: #fbbf24; }
#eePos {
  font-size: 11px; color: var(--dim); margin-left: auto;
}
#wsStatus { font-size: 11px; padding: 2px 8px; border-radius: 3px;
  background: #1e293b; color: var(--dim); }
#wsStatus.on { background: #064e3b; color: #34d399; }

/* ── Main gamepad area ── */
main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  gap: 8px;
  padding: 8px;
  overflow: hidden;
  touch-action: none;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--brd);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px;
  touch-action: none;
}

.panel-title {
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--dim);
}

/* ── Control button base ── */
.btn-ctrl {
  width: var(--btn-size);
  height: var(--btn-size);
  border: 2px solid var(--brd);
  border-radius: 8px;
  background: #0f172a;
  color: var(--txt);
  font: 600 12px var(--mono);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  transition: border-color .1s, background .1s, color .1s, transform .05s;
  touch-action: none;
  line-height: 1.2;
}
.btn-ctrl .icon { font-size: 20px; line-height: 1; }
.btn-ctrl .label { font-size: 10px; color: var(--dim); }
.btn-ctrl.pressed, .btn-ctrl:active {
  border-color: var(--acc);
  background: rgba(34,211,238,.15);
  color: var(--acc);
  transform: scale(0.94);
}
.btn-ctrl.pressed .label { color: var(--acc); }

/* ── Z Panel (left) ── */
.z-panel { gap: 16px; }

/* ── Orientation Panel (center) ── */
.orient-grid {
  display: grid;
  grid-template-columns: repeat(3, var(--btn-size));
  grid-template-rows: repeat(3, var(--btn-size));
  gap: 6px;
}
.orient-grid .empty { width: var(--btn-size); height: var(--btn-size); }
.orient-grid .center-dot {
  width: var(--btn-size); height: var(--btn-size);
  border: 2px solid var(--brd); border-radius: 8px;
  background: #0f172a;
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 10px; letter-spacing: 1px;
}

/* ── XY Panel (right) ── */
.xy-grid {
  display: grid;
  grid-template-columns: repeat(3, var(--btn-size));
  grid-template-rows: repeat(3, var(--btn-size));
  gap: 6px;
}
.xy-grid .empty   { width: var(--btn-size); height: var(--btn-size); }
.xy-grid .center-dot {
  width: var(--btn-size); height: var(--btn-size);
  border: 2px solid var(--brd); border-radius: 8px;
  background: #0f172a;
  display: flex; align-items: center; justify-content: center;
  color: var(--dim); font-size: 10px;
}

/* ── Footer ── */
footer {
  background: var(--panel);
  border-top: 1px solid var(--brd);
  padding: 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  touch-action: none;
}

/* Speed row */
.speed-row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.speed-group {
  display: flex; align-items: center; gap: 6px; flex: 1; min-width: 160px;
}
.speed-group label { font-size: 11px; color: var(--dim); white-space: nowrap; }
.speed-group .val { color: var(--acc); min-width: 36px; text-align: right; font-size: 11px; }
.speed-group input[type=range] {
  flex: 1; accent-color: var(--acc); height: 4px; cursor: pointer;
}
.speed-group .unit { font-size: 10px; color: var(--dim); white-space: nowrap; }

/* Action buttons */
.action-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.btn-action {
  flex: 1; min-width: 80px;
  padding: 10px 6px;
  border: 2px solid var(--brd);
  border-radius: 8px;
  background: #0f172a;
  color: var(--txt);
  font: 600 12px var(--mono);
  cursor: pointer;
  touch-action: manipulation;
  transition: border-color .15s, background .15s, color .15s;
  white-space: nowrap;
}
.btn-action:active { transform: scale(0.96); }
#btnHome  { border-color: #334155; }
#btnHome:active  { border-color: var(--ok);   background: rgba(16,185,129,.15); color: var(--ok);  }
#btnStop  { border-color: #334155; }
#btnStop:active  { border-color: var(--acc);  background: rgba(34,211,238,.15); color: var(--acc); }
#btnEstop { border-color: var(--err); color: var(--err); }
#btnEstop:active { background: rgba(239,68,68,.2); }
#btnRalm  { border-color: var(--warn); color: var(--warn); }
#btnRalm:active  { background: rgba(245,158,11,.15); }
</style>
</head>
<body>

<header>
  <h1>RA605 CTRL</h1>
  <span id="statusBadge">NULL</span>
  <span id="wsStatus">WS 離線</span>
  <div id="eePos">X: — &nbsp; Y: — &nbsp; Z: —</div>
</header>

<main>
  <!-- ══════ LEFT: Z Axis ══════ -->
  <div class="panel z-panel">
    <span class="panel-title">Z 軸</span>

    <button class="btn-ctrl" data-dz="1">
      <span class="icon">▲</span>
      <span class="label">Z+</span>
    </button>

    <button class="btn-ctrl" data-dz="-1">
      <span class="icon">▼</span>
      <span class="label">Z−</span>
    </button>
  </div>

  <!-- ══════ CENTER: Orientation (Yaw / Pitch / Roll) ══════ -->
  <div class="panel">
    <span class="panel-title">姿態控制</span>
    <div class="orient-grid">
      <!-- Row 1: Roll- | Pitch+ | Roll+ -->
      <button class="btn-ctrl" data-droll="-1">
        <span class="icon">↺</span>
        <span class="label">Roll−</span>
      </button>
      <button class="btn-ctrl" data-dpitch="1">
        <span class="icon">▲</span>
        <span class="label">Pitch+</span>
      </button>
      <button class="btn-ctrl" data-droll="1">
        <span class="icon">↻</span>
        <span class="label">Roll+</span>
      </button>

      <!-- Row 2: Yaw- | center | Yaw+ -->
      <button class="btn-ctrl" data-dyaw="-1">
        <span class="icon">◁</span>
        <span class="label">Yaw−</span>
      </button>
      <div class="center-dot">姿態</div>
      <button class="btn-ctrl" data-dyaw="1">
        <span class="icon">▷</span>
        <span class="label">Yaw+</span>
      </button>

      <!-- Row 3: empty | Pitch- | empty -->
      <div class="empty"></div>
      <button class="btn-ctrl" data-dpitch="-1">
        <span class="icon">▼</span>
        <span class="label">Pitch−</span>
      </button>
      <div class="empty"></div>
    </div>
  </div>

  <!-- ══════ RIGHT: XY Movement ══════ -->
  <div class="panel">
    <span class="panel-title">位置移動</span>
    <div class="xy-grid">
      <!-- Row 1: empty | Y+ | empty -->
      <div class="empty"></div>
      <button class="btn-ctrl" data-dy="1">
        <span class="icon">▲</span>
        <span class="label">Y+</span>
      </button>
      <div class="empty"></div>

      <!-- Row 2: X- | center | X+ -->
      <button class="btn-ctrl" data-dx="-1">
        <span class="icon">◁</span>
        <span class="label">X−</span>
      </button>
      <div class="center-dot">XY</div>
      <button class="btn-ctrl" data-dx="1">
        <span class="icon">▷</span>
        <span class="label">X+</span>
      </button>

      <!-- Row 3: empty | Y- | empty -->
      <div class="empty"></div>
      <button class="btn-ctrl" data-dy="-1">
        <span class="icon">▼</span>
        <span class="label">Y−</span>
      </button>
      <div class="empty"></div>
    </div>
  </div>
</main>

<footer>
  <!-- Speed controls -->
  <div class="speed-row">
    <div class="speed-group">
      <label>線速</label>
      <input type="range" id="linSpeed" min="5" max="150" step="5" value="30">
      <span class="val" id="linVal">30</span>
      <span class="unit">mm/s</span>
    </div>
    <div class="speed-group">
      <label>角速</label>
      <input type="range" id="angSpeed" min="1000" max="30000" step="1000" value="10000">
      <span class="val" id="angVal">10</span>
      <span class="unit">°/s</span>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="action-row">
    <button class="btn-action" id="btnHome">⌂ 回原點</button>
    <button class="btn-action" id="btnStop">■ 停止</button>
    <button class="btn-action" id="btnRalm">⚑ 解除警報</button>
    <button class="btn-action" id="btnEstop">✕ 緊急停止</button>
  </div>
</footer>

<script>
// ═══════════════════════════════
// WebSocket
// ═══════════════════════════════
let ws = null;
let reconnTimer = null;

function connect() {
  const h = location.hostname || 'localhost';
  ws = new WebSocket(`ws://${h}:5851/`);

  ws.onopen = () => {
    document.getElementById('wsStatus').textContent = 'WS 連線';
    document.getElementById('wsStatus').className = 'on';
    sendSpeed(); // 同步速度設定
  };

  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'state') updateState(d);
    } catch {}
  };

  ws.onclose = () => {
    document.getElementById('wsStatus').textContent = 'WS 離線';
    document.getElementById('wsStatus').className = '';
    // 3秒後重連
    reconnTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify(obj));
}

// ═══════════════════════════════
// State display
// ═══════════════════════════════
function updateState(d) {
  document.getElementById('eePos').innerHTML =
    `X: <b>${d.x.toFixed(1)}</b> &nbsp; Y: <b>${d.y.toFixed(1)}</b> &nbsp; Z: <b>${d.z.toFixed(1)}</b> mm`;

  const badge = document.getElementById('statusBadge');
  badge.textContent = d.cardState;
  badge.className =
    d.cardState === 'READY'  ? 'ready' :
    d.cardState === 'ALARM'  ? 'alarm' :
    d.cardState === 'NULL'   ? ''      : 'warn';
}

// ═══════════════════════════════
// Speed sliders
// ═══════════════════════════════
document.getElementById('linSpeed').addEventListener('input', e => {
  document.getElementById('linVal').textContent = e.target.value;
  sendSpeed();
});
document.getElementById('angSpeed').addEventListener('input', e => {
  document.getElementById('angVal').textContent = (e.target.value / 1000).toFixed(0);
  sendSpeed();
});

function sendSpeed() {
  send({
    type: 'speed',
    linear:  parseFloat(document.getElementById('linSpeed').value),
    angular: parseFloat(document.getElementById('angSpeed').value),
  });
}

// ═══════════════════════════════
// Multi-touch control buttons
// Each pointer (finger/mouse) captured independently.
// activeMap: pointerId → button element
// ═══════════════════════════════
const activeMap = new Map(); // pointerId → btn element

function getAxes(btn) {
  return {
    dx:     parseFloat(btn.dataset.dx     || 0),
    dy:     parseFloat(btn.dataset.dy     || 0),
    dz:     parseFloat(btn.dataset.dz     || 0),
    dyaw:   parseFloat(btn.dataset.dyaw   || 0),
    dpitch: parseFloat(btn.dataset.dpitch || 0),
    droll:  parseFloat(btn.dataset.droll  || 0),
  };
}

function computeVelocity() {
  let dx=0, dy=0, dz=0, dyaw=0, dpitch=0, droll=0;
  const seen = new Set();
  for (const btn of activeMap.values()) {
    if (seen.has(btn)) continue; // 多指同一按鈕只計一次
    seen.add(btn);
    const a = getAxes(btn);
    dx += a.dx; dy += a.dy; dz += a.dz;
    dyaw += a.dyaw; dpitch += a.dpitch; droll += a.droll;
  }
  // 各軸限制在 [-1, 1]
  const clamp = v => Math.max(-1, Math.min(1, v));
  return { dx: clamp(dx), dy: clamp(dy), dz: clamp(dz),
           dyaw: clamp(dyaw), dpitch: clamp(dpitch), droll: clamp(droll) };
}

function sendMove() {
  if (activeMap.size === 0) {
    send({ type: 'stop' });
  } else {
    const v = computeVelocity();
    send({ type: 'move', ...v });
  }
}

// Bind all .btn-ctrl buttons
document.querySelectorAll('.btn-ctrl').forEach(btn => {
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();
    btn.setPointerCapture(e.pointerId);
    activeMap.set(e.pointerId, btn);
    btn.classList.add('pressed');
    sendMove();
  });

  const release = e => {
    if (!activeMap.has(e.pointerId)) return;
    activeMap.delete(e.pointerId);
    // 若該按鈕沒有其他手指，移除 pressed 樣式
    if (![...activeMap.values()].includes(btn))
      btn.classList.remove('pressed');
    sendMove();
  };

  btn.addEventListener('pointerup',     release);
  btn.addEventListener('pointercancel', release);
  btn.addEventListener('lostpointercapture', release);
});

// ═══════════════════════════════
// Action buttons
// ═══════════════════════════════
document.getElementById('btnHome').addEventListener('pointerdown', e => {
  e.preventDefault();
  send({ type: 'home' });
});
document.getElementById('btnStop').addEventListener('pointerdown', e => {
  e.preventDefault();
  // 清除所有 pressed 狀態
  activeMap.clear();
  document.querySelectorAll('.btn-ctrl').forEach(b => b.classList.remove('pressed'));
  send({ type: 'stop' });
});
document.getElementById('btnEstop').addEventListener('pointerdown', e => {
  e.preventDefault();
  activeMap.clear();
  document.querySelectorAll('.btn-ctrl').forEach(b => b.classList.remove('pressed'));
  send({ type: 'estop' });
});
document.getElementById('btnRalm').addEventListener('pointerdown', e => {
  e.preventDefault();
  send({ type: 'ralm' });
});

// ═══════════════════════════════
// Keyboard fallback (桌面測試用)
// ═══════════════════════════════
const KEY_MAP = {
  'ArrowUp':    { dy:  1 }, 'ArrowDown':  { dy: -1 },
  'ArrowLeft':  { dx: -1 }, 'ArrowRight': { dx:  1 },
  'w': { dy: 1 }, 's': { dy: -1 }, 'a': { dx: -1 }, 'd': { dx: 1 },
  'q': { dz: 1 }, 'e': { dz: -1 },
  'j': { dyaw: -1 }, 'l': { dyaw: 1 },
  'i': { dpitch: 1 }, 'k': { dpitch: -1 },
  'u': { droll: -1 }, 'o': { droll: 1 },
};
const keyActive = new Map(); // key → virtual pointerId
let virtualId = 10000;

window.addEventListener('keydown', e => {
  if (e.repeat || !KEY_MAP[e.key]) return;
  const axes = KEY_MAP[e.key];
  const id = virtualId++;
  keyActive.set(e.key, id);
  // 找到對應的 btn-ctrl 或直接加入 activeMap 用虛擬物件
  const fakeBtn = { dataset: { dx:0,dy:0,dz:0,dyaw:0,dpitch:0,droll:0, ...axes }, _key: e.key };
  activeMap.set(id, fakeBtn);
  sendMove();
});
window.addEventListener('keyup', e => {
  if (!keyActive.has(e.key)) return;
  const id = keyActive.get(e.key);
  keyActive.delete(e.key);
  activeMap.delete(id);
  sendMove();
});

// ═══════════════════════════════
// Prevent context menu & scroll on gamepad area
// ═══════════════════════════════
document.addEventListener('contextmenu', e => e.preventDefault());
document.querySelector('main').addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// ═══════════════════════════════
// Start
// ═══════════════════════════════
connect();
</script>
</body>
</html>
